name: opsmind

services:
  # 会话、消息、摘要、长期记忆及提取任务的唯一持久化数据源。
  mysql:
    image: mysql:8.4
    container_name: opsmind-mysql
    environment:
      MYSQL_DATABASE: opsmind
      MYSQL_USER: opsmind
      MYSQL_PASSWORD: opsmind
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uopsmind -popsmind"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 仅保存可重建的会话上下文缓存和带租约的会话锁。
  redis:
    image: redis:7.4-alpine
    container_name: opsmind-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 本地 OIDC Provider，用于验证真实 JWT 登录与租户、用户隔离。
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: opsmind-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-now}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - ./keycloak/opsmind-realm.json:/opt/keycloak/data/import/opsmind-realm.json:ro
      - ./keycloak/user-profile.json:/opt/keycloak/data/user-profile.json:ro
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/keycloak:/opt/keycloak/data
    restart: unless-stopped

  # Keycloak 启动后写入测试用户的 tenant_id 属性；任务执行完成即退出。
  keycloak-config:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: opsmind-keycloak-config
    entrypoint: ["/bin/bash", "/config/configure-keycloak"]
    environment:
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-now}
    volumes:
      - ./keycloak:/config:ro
    depends_on:
      - keycloak
    restart: "no"

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"
  # 这是新增的 Attu 服务哦！
  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.5
    ports:
      - "8000:3000" # 把本地的 8000 端口映射到容器的 3000 端口 (Attu 默认端口)
    environment:
      # MILVUS_URL 指向 Docker 网络里的 Milvus standalone 服务
      MILVUS_URL: standalone:19530
    depends_on:
      - standalone # 确保 Milvus 启动后再启动 Attu
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  cls-mcp:
    container_name: opsmind-cls-mcp
    image: node:22-alpine
    command: ["npx", "-y", "cls-mcp-server@latest"]
    environment:
      TRANSPORT: sse
      PORT: 3000
      TZ: ${TZ:-Asia/Shanghai}
      MAX_LENGTH: ${CLS_MCP_MAX_LENGTH:-12000}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID:?TENCENTCLOUD_SECRET_ID is required}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY:?TENCENTCLOUD_SECRET_KEY is required}
      TENCENTCLOUD_API_BASE_HOST: ${TENCENTCLOUD_API_BASE_HOST:-tencentcloudapi.com}
    ports:
      - "${CLS_MCP_PORT:-3000}:3000"
    restart: unless-stopped

networks:
  default:
    name: opsmind
